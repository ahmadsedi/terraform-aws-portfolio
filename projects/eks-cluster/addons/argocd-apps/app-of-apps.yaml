apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-apps
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  source:
    repoURL: https://github.com/YOUR_USERNAME/platform-apps
    path: apps
    targetRevision: HEAD

  syncPolicy:
    automated:
      prune: true
      selfHeal: true